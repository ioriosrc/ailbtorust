[build]
# Output directory
dist = "dist"
# The index HTML file
target = "web/index.html"
# Disable file hashing to prevent wasm-bindgen stage dir race condition
filehash = false

[watch]
watch = ["crates", "web"]

[serve]
address = "127.0.0.1"
port = 8080

[[hooks]]
stage = "build"
command = "sh"
command_arguments = ["-c", "cp web/style.css dist/ 2>/dev/null || true"]
