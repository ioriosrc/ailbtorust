[build]
# Output directory
dist = "dist"
# The index HTML file
target = "web/index.html"
# Disable file hashing to prevent wasm-bindgen stage dir race condition
filehash = false
# Disable minification to avoid stage dir race on hot-reload
no_minification = true

[tools]
# Use system-installed wasm-bindgen to avoid Trunk's cache dir race condition
wasm_bindgen = "System"

[watch]
watch = ["crates", "web"]
# Debounce to avoid triggering multiple rapid rebuilds
debounce = "3s"

[serve]
address = "127.0.0.1"
port = 8080

[[hooks]]
stage = "build"
command = "sh"
command_arguments = ["-c", "cp web/style.css dist/ 2>/dev/null || true"]
